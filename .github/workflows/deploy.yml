name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # Vercel deploys automatically — no step needed here.
  # Vercel watches GitHub for pushes to main on its own.
